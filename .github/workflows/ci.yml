name: AutoShield CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run backend smoke tests
        run: python smoke_api_test.py

      - name: Compile backend modules
        run: python -m py_compile api_layer.py db.py auth.py nginx_agent.py smoke_api_test.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: autoshield-react/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: autoshield-react

      - name: Run frontend smoke tests
        run: npm run test:smoke
        working-directory: autoshield-react

      - name: Build frontend
        run: npm run build
        working-directory: autoshield-react
