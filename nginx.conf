events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 🔴 FIX 1: Ensure Nginx recurses through multiple proxies to find the true client IP
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 10.0.0.0/8;

    # 🔴 FIX 6: Added X-Forwarded-For to the log format for better correlation
    log_format autoshield '$remote_addr|$http_x_forwarded_for|$time_local|"$request"|$status|$body_bytes_sent';
    access_log /var/log/nginx/access.log autoshield;

    # 🔴 FIX 2: Granular rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=50r/s;

    # 🔴 FIX 3: Global proxy timeouts to prevent Slowloris attacks
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;

    upstream backend {
        server backend:80;
    }

    upstream autoshield_api {
        server api:8503;
    }

    upstream dashboard {
        server dashboard:3000;
    }

    server {
        listen 80;
        server_name _;

        # 🔴 FIX 4: Hardened security headers (now includes CSP)
        # Using 'always' ensures headers are sent even on 4xx/5xx error pages
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self';" always;

        location / {
            # Lighter rate limit for general web traffic
            limit_req zone=web_limit burst=50 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            # Stricter rate limit for the API
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://autoshield_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /ws/ {
            proxy_pass http://autoshield_api/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /dashboard/ {
            limit_req zone=web_limit burst=20 nodelay;

            proxy_pass http://dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 🔴 FIX 5: Ensure this file is mounted in docker-compose, or Nginx will crash
            auth_basic "AutoShield Administrator Login";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }
    }
}